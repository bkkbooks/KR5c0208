front:
  text: 太上金櫃玉鏡延生洞玄燭幽懴則六
  hash: sha256:9e5d0b7b28a7889adf3aaafa6f450d72b4f5f1796d4676270b1fc9e8f3e33bc7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0208_SJB_000-180341b, image: sjb/18/180341b.png}
body:
  text: 虚一眞人序夫清濁未分無間昏曉太極肇判二儀迺分皆本道之一炁而化者也當龍漢延康之先道炁莽莽質象未定無復形器但氤氲勃勃而巳至赤明之初陽精始輝迴運莫測所謂非化而化自然而然龍漢之初三千億萬九百五十一年玉清交運正度太初流化萬象纏結道炁上清變化七十九億萬三十九年大丹成形始有日月五星道機沉蓄微露化端太清纏錬五十億萬一十二年萬天棊布神化洞明造化發泄景象列分髙玄明豁大道行焉元始天尊於清微天神霄玉清妙境傳教道君玄一眞經靈寳金誥無量妙訣自開化巳來迄于兹世道君凡萬有一千五百二十度降世今當陽九運終天地交變民物夭傷道君慈憫敷宣此經三卷遣左玄眞人齎付蓬萊宫宫中眞人刻書玉簡日習誦詠今見兆民受諸苦難漂沉塗趣難復人身玉晨道㫖令降于世傳付清信之人護身保命孽重不信之人勿示窺笑輕泄漏幔殃及九祖長役鬼官勉而行之祕而愼焉此經凡有三名一曰金櫃玉鏡眞經二曰洞玄燭幽懴三曰神寳祕章敷明妙紀開悟有縁修而進之可以召靈炁於三關藹寳華於九户功滿德就名書玉庭至孝之士報先化根宗遵奉禮誦雖億魯之遠萬祖之衆䰟繫幽苦者承是功德皆即受度上登朱陵在世之人年災月厄非横纏綿禮誦修崇則上消天災下禳毒害保寧家國與善因縁修眞之士究而悟之則殃罪解於冥塗靈眞備於純德洞合妙道身得神仙更能立行立功濟人及物上超億祖慶延子孫世世昌榮生賢出聖此道尊妙功德無邊敬奉修持無所不至矣凡禮誦此經先香湯沐浴齋戒七日於淨室中面東正坐叩齒三十六通閉目靜思身坐青黄紫三色雲炁之中存北斗覆頭罡星指前離已七尺次存青龍白虎朱雀玄武各從本藏出羅列左右前後次存自已眉後兩小穴中日從左出紫赤九芒月從右出黄白十芒各離已九尺光霞滿室次存前日月光芒灌于鼻中入腦後四寸金華宫令項後生出圎象大如車輪光明炳然如此分明密念開經玄藴呪畢然後焚香開經跪拜禮念天尊聖號自有護法神兵營護其人志誠禮念其功不可具悉開經玄藴呪天眞丹華宫清靈玉室中翠玄都六一元臺闕帝公素念生精炁髙虚飛駕從心經隱三舍薰鬱長生房紫堂通絳闕赤城妙田倉神門正理觀潔然道慧香性命守虚無懷珠抱玉陽迴神本國冨明登紫壽方太上金櫃玉鏡延生洞玄燭幽懴太上老君於太清天上玄都山中坐七寳臺㑹諸天仙衆燒自然栴檀眞香告諸仙曰下方衆生皆父母寄胎誕育而得生身受命於天成形於地以日爲䰟以月爲魄靈備萬物唯人是稱初生之時皆受天地清寧之炁本來清靜與天長久朴散之後染着愛欲背眞失性逐物隨情妄僞欺貪婬狠殺盜惡口兩舌嗔癡嫉妬不忠不孝背義忘恩毀道謗眞造諸罪業流輪三塗無期出離或凌犯星辰干冐天地遂致兵災水旱疫毒流行蟲蛇虎狼精邪蠱魅疾病官刑諸禍並起絶滅家門漂流苦海時與㑹中有一眞人名曰普救即從座起稽首禮拜瞻仰尊顔長跪告曰如是衆生受諸惡報作何因縁得免苦難願垂玄造廣度沉淪太上曰復坐靜念爲汝敷宣清信男女有諸災厄横事縈牽無處解謝者如法齋沐謹於三清像前清靜身心用異花珍果淨水名香燈燭醴獻䖍心瞻敬作懴悔言弟子某甲於曠劫以來至于今日不信經教唯罪是修興十惡心迷五毒行三業所造無邊之罪惡惡相牽多招災難今日辛聞眞教省悔前非懇禱至誠一心懴悔伏願聖慈盡除徃罪志心敬禮志心敬禮虚無自然元始天尊志心敬禮太上大道玉晨道君志心敬禮太上玄元聖祖老君志心敬禮長生保命護身天尊志心敬禮長生保命無上天尊志心敬禮消災除病無上天尊志心敬禮監生注禄延壽天尊志心敬禮定命檢簿靈寳天尊志心敬禮昊天勑下演法眞人志心敬禮降世大慈救苦眞人志心敬禮慈悲度厄眞人志心敬禮尋聲救苦眞人志心敬禮濟生度死眞人志心敬禮萬福護身眞人志心敬禮蓬萊扶教法師志心敬禮蓬萊通天法師於是聖號冝加敬禮每日持念七七遍乃至百遍即有護法神兵救苦眞人常隨護衞克免災危萬禍潜消増延禄壽若有衆生聞是聖號恭敬頂禮與前功德無異禮竟䖍誠復當懴悔弟子臣某甲自從無始以來至于今日不忠君主不奉尊親不敬師徒不友兄弟諂上虐下背親向踈聽妻妾語違父母訓或爲婦人性行不眞違背父母不孝翁婆撓亂六親輕賤夫婿抛擲五榖非理裁剪盗竊慵讒闘舌隣里常行妬忌懷挾外心如此罪愆必招苦報生遭人憎死墮地獄恭對聖眞咸悉懴悔弟子臣某甲自從無始巳來至于今日非義而動背理而行冨騁勢豪貧恣兇暴以惡爲能見殺加怒殺人取財傾人取位誅降戮服凌孤逼寡撓亂國政輕蔑天民妬賢嫉能掩善揚惡教人爲惡自罪引他射飛逐走發蟄驚棲塡穴毀巢傷胎破卵偷盗邪婬妄言綺語飲酒食肉惡罵兩舌慳貪瞋恚狠戾愚癡巧僞欺謾隂賊殘害知過不攺知善不爲諸惡罪縁無不備作今兹發露不敢覆藏恭對聖眞咸乞原赦弟子臣某甲自從無始巳來至于今日不識正道多犯罪愆恨天怨地呵風罵雨憎嫌寒暑厭惡三光訕謗聖賢侵夌道德輕誹聖典魔障善縁拒遏上眞汚毀廟像久視日月輙指三光指虹唾星混穢井竈呪誓呼神違願犯戒妄解聖論輕泄天機今兹首露不敢復爲恭對聖眞咸乞原赦懴巳䖍誠志心朝禮志心敬禮虚無自然元始天尊志心敬禮太上大道玉晨道君志心敬禮太上玄元聖祖老君志心敬禮昊天玉皇上帝志心敬禮紫微天皇大帝志心敬禮紫微北極大帝志心敬禮南極注生大帝志心敬禮日宫太陽帝君志心敬禮月宫太隂皇君志心敬禮木德歳星君志心敬禮火德熒惑星君志心敬禮金德太白星君志心敬禮水德辰星君志心敬禮土德鎭星君志心敬禮神首羅㬋星君志心敬禮神尾計都星君志心敬禮天一紫炁星君志心敬禮太一月孛星君禮竟䖍誠復當懴悔弟子臣某甲自從無始巳來至于今日多迷眞道廣造罪根履乾坤而寧知覆載瞻日月而曽感照臨五常素昧於内修六染難逃於後患或有今生宿世積疊餘殃故殺悮傷之尤害物傷人之罪或則破齋犯戒違願欺心意有愛憎心生蛆佞對星辰而設誓向神眞而惡言負債辜恩貪婪不悉千頭營運一向謀生豈分善惡之䂓莫曉存亡之度今則退思𥙷過具述首陳謹發䖍誠願垂慈宥敢盡愚𠂻之懇遥祈寥廓之尊伏願少迴靈貺俯鑒卑𠂻咸除黒簿之愆延注丹臺之善神解災罹運消迍滯禍沉徃劫福降今辰一切之中常沐道䕃臣無任惶懼䖍祝之至稽首無上正眞三寳老君曰凡禮是經皆當香湯沐浴齋戒必獲感通功德無量普救曰齋沐之法敢告指導老君曰香湯者五香湯也法取青木香白檀香茅香沉香薰陸香多少隨冝取淨水一石先以桃白皮竹葉下煎數沸濾去滓次下五香多少隨冝若在山林幽棲貧薄無力止以桃竹爲善先以沐髮取木杓以柄指月建思五色雲炁滿室三辰光照盆上以杓左行攪香水三十六度視香湯呪曰太玄眞液錬炁生雲沐澤蒼華誦詠洞經七祖飛仙我騰上清凡七遍次就榻解衣而呪曰五斗配衣龍虎侍眞開明三景上登玉晨解帶成仙使我長生次解髻就沐呪曰神宫振天黒雲散開流金火鈴燠擲無邊使我通眞遊行諸天無量度人招靈命仙次沐髮竟撮髻戴冠呪曰雲層碧玄竦嶽瑶京冠髻召仙五炁攝眞神華發光上昇帝庭次入浴執杓取五方炁色入湯中攪三十六遍畢執杓向旺方呪曰霐池玉泉灌我身形内錬五藏外通九門使炁開通尸穢蕩清萬遍保舉入登帝庭次存三辰入湯中良久就浴訖别取淨者五香湯飲之一杯即凝神黙想内外貞白而乃呪曰黄神守關青帝護䰟天騶咆哮萬魔喪睛尸血盡滌青蟲滅形七魄錬化紫雲自生遊宴太無髙眞併襟次還着衣呪曰神童侍衣玉女燒香登拜經寳玉音琳琅度我七祖除滅禍殃延年長壽寳漿雲粮齋者内齋其心外齋其形戒者内持其志外持其行設醮奏章亦依是式無災不滅無願不成修眞之人謹冝遵愼道言德莫大於好生功莫大於修成凡處塵域之内蠢動含生禀受雖殊性命惟一見人疾病官刑飢貧困厄或水陸或飛走䧟於難地若能方便愍救是謂好生之德復有男女喜捨財物修建宫殿繪塑眞儀印寫經典讀誦教人製作旛花施設燈燭作諸布施供養乃至平治道路修疊橋彴栽種樹木𥙷理隄渠是謂修成之功若有衆生恣縱愚昧輕誹經典損生毀成當知是人罪根難滅命沉六趣永失人身劫劫生生無由出離信男善女戒而愼之老君曰此經是道君金口所宣吾今授汝傳教世間誦之聲叅紫極嚮聞諸天太上欣唱衆眞敬禮故能拯死苦於三塗超形神於上清億曽萬祖皆即受度見存利益福禄増延更廣好生之德修成之功孝養尊親敬奉師友濟恤貧困洗雪𡨚沉如此功德愈於兹矣遵依是經生成兼備吾遣察命録子之行奏上玉清名摽金格隨行深淺得爲眞人值遇是經冝加勉力於是普救受得眞經歡躍非常而說偈曰玄哉元老君衆生慈父毋演教不思議普救無邊苦若能志心持存亡皆濟度功德貴生成隨行登仙路爾時普救說是偈巳諸天仙衆同聲稱善稽首再拜至尊敬禮而退太上金櫃玉鏡延生洞玄燭幽懴
